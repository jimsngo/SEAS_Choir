    <script>
        // ============================================
        // MASS INFO FUNCTIONS
        // ============================================
        function loadMassInfo() {
            // Load mass info from server
            fetch('/config/mass_info.json')
                .then(response => response.json())
                .then(data => {
                    massInfo = data;
                    displayMassInfo();
                })
                .catch(error => {
                    console.error('Error loading mass info:', error);
                    displayMassInfo();
                });
        }

        function populateCanторDropdown() {
            // Cantor options are now hardcoded in the HTML
        }

        function displayMassInfo() {
            const display = document.getElementById('massInfoDisplay');
            display.innerHTML = `
                <div class="mass-info-item">
                    <div class="mass-info-label">Mass Name</div>
                    <div class="mass-info-value">${massInfo.mass_name || 'Not set'}</div>
                </div>
                <div class="mass-info-item">
                    <div class="mass-info-label">Date</div>
                    <div class="mass-info-value">${massInfo.date || 'Not set'}</div>
                </div>
                <div class="mass-info-item">
                    <div class="mass-info-label">Time</div>
                    <div class="mass-info-value">${massInfo.time || 'Not set'}</div>
                </div>
                <div class="mass-info-item">
                    <div class="mass-info-label">Cantor</div>
                    <div class="mass-info-value">${massInfo.cantor || 'Not set'}</div>
                </div>
            `;
        }

        function toggleMassInfoEdit() {
            const form = document.getElementById('massInfoForm');
            form.classList.toggle('show');

            if (form.classList.contains('show')) {
                document.getElementById('massName').value = massInfo.mass_name || '';
                document.getElementById('massDate').value = massInfo.date || '';
                document.getElementById('massTime').value = massInfo.time || '';
                document.getElementById('massCantor').value = massInfo.cantor || '';
            }
        }

        function saveMassInfo() {
            const updated = {
                mass_name: document.getElementById('massName').value,
                date: document.getElementById('massDate').value,
                time: document.getElementById('massTime').value,
                cantor: document.getElementById('massCantor').value
            };

            // Update the massInfo variable
            massInfo = updated;
            displayMassInfo();
            toggleMassInfoEdit();

            // Save to server
            fetch('/config/mass_info.json', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updated)
                })
                .then(response => response.json())
                .then(data => {
                    showStatus('✓ Mass info saved to server', 'success');
                })
                .catch(error => {
                    console.error('Error saving mass info:', error);
                    showStatus('✗ Error saving mass info', 'error');
                });
        }

        // ============================================
        // TEXT CLEANING FUNCTION
        // ============================================
        function cleanText(raw) {
            let cleaned = raw.replace(/\uFEFF|\u200B|\u200C|\u200D|\u00A0|\u2028|\u2029/g, '');
            cleaned = cleaned.replace(/\r\n|\r/g, '\n');
            cleaned = cleaned.replace(/[ \t]+$/gm, '');
            cleaned = cleaned.replace(/(\[[^\]]+\])([^\n])/g, '$1\n$2');
            cleaned = cleaned.replace(/\n{3,}/g, '\n\n');
            cleaned = cleaned.replace(/[^\x00-\x7F]/g, '');
            cleaned = cleaned.trim();
            return cleaned;
        }

        // ============================================
        // METADATA EXTRACTION
        // ============================================
        function extractMetadata(text) {
            const lines = text.split('\n');
            let meta = {
                title: '',
                author: '',
                sections: []
            };

            function normalizeTag(line) {
                return line.replace(/\[\s*(.+?)\s*\]/, '[$1]').trim().toLowerCase();
            }

            for (let i = 0; i < lines.length; i++) {
                if (normalizeTag(lines[i]) === '[title]') {
                    for (let j = i + 1; j < lines.length; j++) {
                        if (lines[j].trim().length > 0) {
                            meta.title = lines[j].trim();
                            break;
                        }
                    }
                    break;
                }
            }

            for (let i = 0; i < lines.length; i++) {
                if (normalizeTag(lines[i]) === '[author]') {
                    for (let j = i + 1; j < lines.length; j++) {
                        if (lines[j].trim().length > 0) {
                            meta.author = lines[j].trim();
                            break;
                        }
                    }
                    break;
                }
            }

            for (let i = 0; i < lines.length; i++) {
                const tagMatch = lines[i].trim().match(/^\[(.+?)\]$/);
                if (tagMatch) {
                    const tag = tagMatch[1].toLowerCase();
                    if (tag !== 'title' && tag !== 'author') {
                        let content = [];
                        for (let j = i + 1; j < lines.length; j++) {
                            if (lines[j].trim().match(/^\[.+?\]$/)) break;
                            if (lines[j].trim()) content.push(lines[j].trim());
                        }
                        if (content.length > 0) {
                            meta.sections.push({
                                tag: tagMatch[1],
                                content: content.join('\n')
                            });
                        }
                    }
                }
            }

            return meta;
        }

        // ============================================
        // PDF GENERATION
        // ============================================
        async function generatePdf(metadata) {
            const {
                PDFDocument,
                StandardFonts,
                rgb
            } = PDFLib;
            const pdfDoc = await PDFDocument.create();
            let font = await pdfDoc.embedFont(StandardFonts.Helvetica);
            let fontBold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);

            const pageWidth = 612;
            const pageHeight = 792;
            const margin = 36;
            const lineHeight = 15;

            let currentPage = pdfDoc.addPage([pageWidth, pageHeight]);
            let yPosition = pageHeight - margin;

            if (metadata.title) {
                currentPage.drawText(metadata.title, {
                    x: margin,
                    y: yPosition,
                    size: 18,
                    font: fontBold,
                    color: rgb(0.4, 0.5, 0.9)
                });
                yPosition -= lineHeight * 1.5;
            }

            if (metadata.author) {
                currentPage.drawText(`by ${metadata.author}`, {
                    x: margin,
                    y: yPosition,
                    size: 12,
                    font: font,
                    color: rgb(0.5, 0.5, 0.5)
                });
                yPosition -= lineHeight * 2;
            }

            for (const section of metadata.sections) {
                if (yPosition < margin + lineHeight * 3) {
                    currentPage = pdfDoc.addPage([pageWidth, pageHeight]);
                    yPosition = pageHeight - margin;
                }

                currentPage.drawText(`[${section.tag}]`, {
                    x: margin,
                    y: yPosition,
                    size: 13,
                    font: fontBold,
                    color: rgb(0.3, 0.3, 0.3)
                });
                yPosition -= lineHeight * 1.2;

                const words = section.content.split(/\s+/);
                let line = '';
                const maxWidth = pageWidth - 2 * margin;

                for (const word of words) {
                    const testLine = line ? line + ' ' + word : word;
                    const width = testLine.length * 6;

                    if (width > maxWidth && line) {
                        if (yPosition < margin + lineHeight) {
                            currentPage = pdfDoc.addPage([pageWidth, pageHeight]);
                            yPosition = pageHeight - margin;
                        }
                        currentPage.drawText(line, {
                            x: margin,
                            y: yPosition,
                            size: 11,
                            font: font,
                            color: rgb(0, 0, 0)
                        });
                        yPosition -= lineHeight;
                        line = word;
                    } else {
                        line = testLine;
                    }
                }

                if (line) {
                    if (yPosition < margin + lineHeight) {
                        currentPage = pdfDoc.addPage([pageWidth, pageHeight]);
                        yPosition = pageHeight - margin;
                    }
                    currentPage.drawText(line, {
                        x: margin,
                        y: yPosition,
                        size: 11,
                        font: font,
                        color: rgb(0, 0, 0)
                    });
                    yPosition -= lineHeight;
                }

                yPosition -= lineHeight * 0.5;
            }

            return await pdfDoc.save();
        }

        // ============================================
        // STATE & MODAL
        // ============================================
        const moments = [];
        const files = {};
        let currentMoment = null;
        // massInfo is already declared globally at top of page

        function openModal(momentName, fileType) {
            currentMoment = {
                momentName,
                fileType
            };
            const fileObj = files[momentName] && files[momentName][fileType];

            if (!fileObj) {
                showStatus('No file selected', 'error');
                return;
            }

            document.getElementById('modalTitle').textContent = `${fileType.toUpperCase()} - ${momentName}`;
            const txtBtn = document.getElementById('downloadTxtBtn');
            const pdfBtn = document.getElementById('downloadPdfBtn');
            const metadata = document.getElementById('modalMetadata');
            const preview = document.getElementById('modalPreview');

            txtBtn.style.display = 'none';
            pdfBtn.style.display = 'none';
            metadata.style.display = 'none';

            if (fileType === 'txt') {
                fileObj.file.text().then(text => {
                    const cleanedText = cleanText(text);
                    const meta = extractMetadata(cleanedText);

                    metadata.innerHTML = `
            <div class="metadata-item">
              <div class="metadata-label">Title</div>
              <div class="metadata-value">${meta.title || '(not found)'}</div>
            </div>
            <div class="metadata-item">
              <div class="metadata-label">Author</div>
              <div class="metadata-value">${meta.author || '(not found)'}</div>
            </div>
            <div class="metadata-item">
              <div class="metadata-label">Sections</div>
              <div class="metadata-value">${meta.sections.length}</div>
            </div>
          `;
                    metadata.style.display = 'block';

                    preview.innerHTML =
                        `<div class="preview-label">Preview</div><div class="preview-content">${cleanedText.substring(0, 400)}${cleanedText.length > 400 ? '\n...(truncated)' : ''}</div>`;

                    txtBtn.style.display = 'block';
                    pdfBtn.style.display = 'block';

                    txtBtn.onclick = () => downloadFile(cleanedText, `${momentName}_cleaned.txt`, 'text/plain');
                    pdfBtn.onclick = () => generateAndDownloadPdf(meta, momentName);

                    fileObj.cleanedText = cleanedText;
                    fileObj.metadata = meta;
                });
            } else if (fileType === 'pdf') {
                preview.innerHTML =
                    '<div class="preview-label">PDF Preview</div><div class="preview-content">PDF files can be viewed with your system PDF viewer</div>';
            } else if (fileType === 'mp3') {
                preview.innerHTML =
                    `<div class="preview-label">Audio Preview</div><audio controls style="width: 100%;" src="${fileObj.url}"></audio>`;
            }

            document.getElementById('previewModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('previewModal').classList.remove('show');
            currentMoment = null;
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], {
                type
            });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        async function generateAndDownloadPdf(meta, momentName) {
            document.getElementById('downloadPdfBtn').disabled = true;
            showStatus('Generating PDF...', 'info');
            try {
                const pdfBytes = await generatePdf(meta);
                const blob = new Blob([pdfBytes], {
                    type: 'application/pdf'
                });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${momentName}_lyrics.pdf`;
                a.click();
                URL.revokeObjectURL(url);
                showStatus('✓ PDF generated!', 'success');
            } catch (error) {
                showStatus(`PDF Error: ${error.message}`, 'error');
            }
            document.getElementById('downloadPdfBtn').disabled = false;
        }

        // ============================================
        // UI INITIALIZATION
        // ============================================
        async function loadMoments() {
            // Fetch moments.json from config
            try {
                const response = await fetch('/config/moments.json');
                const data = await response.json();
                moments.length = 0;
                moments.push(...data);
                renderMoments();
            } catch (error) {
                console.error('Could not load moments.json:', error);
                showStatus('Could not load moments data', 'error');
            }
        }

        function renderMoments() {
            const grid = document.getElementById('momentsGrid');
            grid.innerHTML = '';

            moments.forEach(moment => {
                const card = document.createElement('div');
                card.className = 'moment-card';

                const name = moment.moment || 'Unknown';
                if (!files[name]) {
                    files[name] = {
                        txt: null,
                        pdf: null,
                        mp3: null,
                        original: {
                            txt: moment.txt || '',
                            pdf: moment.pdf || '',
                            mp3: moment.mp3 || ''
                        }
                    };
                }

                card.innerHTML = `
          <div class="moment-header">
            <div class="moment-info">
              <div class="moment-name">${name}</div>
              <div class="moment-title">${moment.title || ''}</div>
              <div class="moment-author">${moment.author || ''}</div>
            </div>
            <button class="moment-toggle-btn" onclick="toggleMomentContent('${name}')">▼</button>
          </div>

          <div class="moment-content" id="content-${name}">
            <!-- TXT FILE -->
            <div class="file-section">
              <div class="file-type-label">📝 Lyrics (.txt)</div>
              <div style="font-size: 10px; color: #999; margin-bottom: 6px;">Current: ${moment.txt ? moment.txt.split('/').pop() : 'none'}</div>
              <div class="upload-zone" data-moment="${name}" data-type="txt">
                <p>Drop or click to upload</p>
              </div>
              <div class="file-display" data-moment="${name}" data-type="txt">
                <div class="no-file">No file</div>
              </div>
            </div>

            <!-- PDF FILE -->
            <div class="file-section">
              <div class="file-type-label">📄 Sheet Music (.pdf)</div>
              <div style="font-size: 10px; color: #999; margin-bottom: 6px;">Current: ${moment.pdf ? moment.pdf.split('/').pop() : 'none'}</div>
              <div class="upload-zone" data-moment="${name}" data-type="pdf">
                <p>Drop or click to upload</p>
              </div>
              <div class="file-display" data-moment="${name}" data-type="pdf">
                <div class="no-file">No file</div>
              </div>
            </div>

            <!-- MP3 FILE -->
            <div class="file-section">
              <div class="file-type-label">🎵 Audio (.mp3)</div>
              <div style="font-size: 10px; color: #999; margin-bottom: 6px;">Current: ${moment.mp3 ? moment.mp3.split('/').pop() : 'none'}</div>
              <div class="upload-zone" data-moment="${name}" data-type="mp3">
                <p>Drop or click to upload</p>
              </div>
              <div class="file-display" data-moment="${name}" data-type="mp3">
                <div class="no-file">No file</div>
              </div>
            </div>

            <button class="btn-primary" style="width: 100%; margin-top: 15px;" onclick="updateMoment('${name}')">✓ Update Moment</button>
          </div>
        `;

                grid.appendChild(card);

                // Setup upload zones
                card.querySelectorAll('.upload-zone').forEach(zone => {
                    const moment = zone.dataset.moment;
                    const type = zone.dataset.type;

                    zone.addEventListener('click', () => {
                        const input = document.createElement('input');
                        input.type = 'file';
                        input.accept = type === 'txt' ? '.txt' : type === 'pdf' ? '.pdf' :
                            '.mp3';
                        input.onchange = (e) => handleFileUpload(e, moment, type);
                        input.click();
                    });

                    zone.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        zone.classList.add('dragover');
                    });

                    zone.addEventListener('dragleave', () => {
                        zone.classList.remove('dragover');
                    });

                    zone.addEventListener('drop', (e) => {
                        e.preventDefault();
                        zone.classList.remove('dragover');
                        const files = e.dataTransfer.files;
                        if (files.length > 0) {
                            const file = files[0];
                            const ext = file.name.split('.').pop().toLowerCase();
                            if ((type === 'txt' && ext === 'txt') ||
                                (type === 'pdf' && ext === 'pdf') ||
                                (type === 'mp3' && ext === 'mp3')) {
                                handleFileUpload({
                                    target: {
                                        files: [file]
                                    }
                                }, moment, type);
                            } else {
                                showStatus(`Wrong file type. Expected ${type.toUpperCase()}`,
                                    'error');
                            }
                        }
                    });
                });
            });
        }

        function handleFileUpload(e, momentName, fileType) {
            const file = e.target.files[0];
            if (!file) return;

            if (!files[momentName]) files[momentName] = {};

            files[momentName][fileType] = {
                file,
                name: file.name,
                url: URL.createObjectURL(file),
                size: file.size
            };

            updateFileDisplay(momentName, fileType);
            showStatus(`✓ ${fileType.toUpperCase()} file added`, 'success');
        }

        function updateFileDisplay(momentName, fileType) {
            const display = document.querySelector(
                `.file-display[data-moment="${momentName}"][data-type="${fileType}"]`);
            const fileObj = files[momentName][fileType];

            if (fileObj) {
                const size = (fileObj.size / 1024).toFixed(1);
                display.innerHTML = `
          <div class="file-item">
            <div class="filename">${fileObj.name}</div>
            <div class="actions">
              <button onclick="openModal('${momentName}', '${fileType}')">👁️ View</button>
              <button class="delete" onclick="deleteFile('${momentName}', '${fileType}')">✕</button>
            </div>
          </div>
        `;
            } else {
                display.innerHTML = '<div class="no-file">No file</div>';
            }
        }

        function deleteFile(momentName, fileType) {
            if (files[momentName][fileType]) {
                URL.revokeObjectURL(files[momentName][fileType].url);
                files[momentName][fileType] = null;
                updateFileDisplay(momentName, fileType);
                showStatus(`✓ File removed`, 'success');
            }
        }

        function updateMoment(momentName) {
            const momentData = moments.find(m => m.moment === momentName);
            if (!momentData) return;

            const fileData = files[momentName];
            const hasChanges = (fileData.txt && fileData.txt.file) ||
                (fileData.pdf && fileData.pdf.file) ||
                (fileData.mp3 && fileData.mp3.file);

            if (!hasChanges) {
                showStatus('No files changed for this moment', 'info');
                return;
            }

            // Collect old file paths to delete
            const oldFiles = [];
            if (fileData.txt && fileData.txt.file && momentData.txt) {
                oldFiles.push(momentData.txt);
            }
            if (fileData.pdf && fileData.pdf.file && momentData.pdf) {
                oldFiles.push(momentData.pdf);
            }
            if (fileData.mp3 && fileData.mp3.file && momentData.mp3) {
                oldFiles.push(momentData.mp3);
            }

            // First, upload files to server
            const uploadPromises = [];

            if (fileData.txt && fileData.txt.file) {
                const formData = new FormData();
                formData.append('file', fileData.txt.file);
                uploadPromises.push(fetch('/upload', {
                    method: 'POST',
                    body: formData
                }));
            }

            if (fileData.pdf && fileData.pdf.file) {
                const formData = new FormData();
                formData.append('file', fileData.pdf.file);
                uploadPromises.push(fetch('/upload', {
                    method: 'POST',
                    body: formData
                }));
            }

            if (fileData.mp3 && fileData.mp3.file) {
                const formData = new FormData();
                formData.append('file', fileData.mp3.file);
                uploadPromises.push(fetch('/upload', {
                    method: 'POST',
                    body: formData
                }));
            }

            // Wait for all file uploads to complete
            Promise.all(uploadPromises)
                .then(responses => Promise.all(responses.map(r => r.json())))
                .then(uploadResults => {
                    // Check if all uploads were successful
                    const allSuccess = uploadResults.every(result => result.success);
                    if (!allSuccess) {
                        throw new Error('One or more file uploads failed');
                    }

                    // Update the moment object with new file references
                    const updatedMoments = moments.map(m => {
                        if (m.moment === momentName) {
                            const updated = {
                                ...m
                            };

                            if (fileData.txt && fileData.txt.file) {
                                updated.txt = `src/data/lyrics/${fileData.txt.name}`;
                            }
                            if (fileData.pdf && fileData.pdf.file) {
                                updated.pdf = `src/data/pdfs/${fileData.pdf.name}`;
                            }
                            if (fileData.mp3 && fileData.mp3.file) {
                                updated.mp3 = `src/data/mp3s/${fileData.mp3.name}`;
                            }

                            return updated;
                        }
                        return m;
                    });

                    // Save updated moments to server
                    return fetch('/config/moments.json', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(updatedMoments)
                    }).then(r => r.json()).then(data => {
                        // Update local moments array
                        moments.length = 0;
                        moments.push(...updatedMoments);

                        // Delete old files
                        const deletePromises = oldFiles.map(filePath =>
                            fetch('/delete-file', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    filePath
                                })
                            })
                        );

                        return Promise.all(deletePromises);
                    }).then(() => {
                        showStatus(`✓ Saved "${momentName}" to server and cleaned up old files`, 'success');
                    });
                })
                .catch(error => {
                    console.error('Error uploading or saving:', error);
                    showStatus(`✗ Error: ${error.message}`, 'error');
                });
        }

        function toggleMomentContent(momentName) {
            const content = document.getElementById(`content-${momentName}`);
            content.classList.toggle('show');
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status show ${type}`;
            if (type !== 'error') {
                setTimeout(() => status.classList.remove('show'), 3000);
            }
        }


        // Initialize
        loadMassInfo();
        loadMoments();
    </script>
</body>

</html>
